<div class="sheet-list-container">
    <!-- Header -->
    <div class="sheet-list-toolbar">
        <h5 class="title"><i class="bi bi-file-earmark-spreadsheet icon-success"></i> Spreadsheets</h5>
        <button class="btn-action" (click)="createNewDoc()">
            <i class="bi bi-plus-lg"></i> Create New
        </button>
    </div>

    <!-- List Content -->
    <div class="sheet-list-content">
        @if (sheets().length === 0 && !isCreating()) {
            <div class="empty-state">
                <i class="bi bi-table empty-icon"></i>
                <h5 class="empty-title">No Spreadsheets Yet</h5>
                <p class="empty-text">Click 'Create New' to get started</p>
                <button class="btn-action mt-2" (click)="createNewDoc()">Create First Spreadsheet</button>
            </div>
        } @else {
            <div class="sheet-grid">
                @if (isCreating()) {
                    <div class="grid-item">
                        <div class="sheet-card creating">
                            <div class="card-body">
                                <div class="card-header">
                                    <div class="icon-box">
                                        <i class="bi bi-file-earmark-spreadsheet-fill"></i>
                                    </div>
                                    <input type="text" #createInput class="inline-create-input" 
                                           [ngModel]="newItemName()" 
                                           (ngModelChange)="newItemName.set($event)"
                                           (keyup.enter)="confirmCreate()"
                                           (keyup.escape)="cancelCreate()"
                                           (blur)="confirmCreate()">
                                </div>
                                <div class="card-meta">Creating...</div>
                            </div>
                        </div>
                    </div>
                }
                @for (doc of sheets(); track doc.id) {
                    <div class="grid-item">
                        <a [routerLink]="['/', routePrefix, 'spaces', spaceId, 'sheet', doc.id]" class="sheet-link">
                            <div class="sheet-card">
                                <div class="card-body">
                                    <div class="card-header">
                                        <div class="icon-box">
                                            <i class="bi bi-file-earmark-spreadsheet-fill"></i>
                                        </div>
                                        <div class="title-wrapper">
                                            <h6 class="card-title" [title]="doc.name">{{ doc.name }}</h6>
                                        </div>
                                    </div>
                                    <div class="card-meta">
                                        <i class="bi bi-clock"></i> Updated {{ doc.updatedAt | date:'short' }}
                                    </div>
                                </div>
                            </div>
                        </a>
                    </div>
                }
            </div>
        }
    </div>
</div>
