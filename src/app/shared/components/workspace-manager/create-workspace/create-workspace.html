<div class="create-workspace-container">
    <div class="manual-creation-section">
        <label for="workspaceName">Workspace Name</label>
        <div class="input-group">
            <input id="workspaceName" type="text" [ngModel]="workspaceName()" (ngModelChange)="onNameChange($event)"
                placeholder="E.g., Personal Projects" (keyup.enter)="createManual()" [disabled]="isSubmitting()"
                class="quilix-input" [class.has-error]="validationError() !== null" />
            <button class="action-btn primary"
                [disabled]="isSubmitting() || !workspaceName().trim() || validationError() !== null"
                (click)="createManual()">
                @if (isSubmitting()) {
                <i class="bi bi-arrow-repeat spin"></i>
                } @else {
                Create
                }
            </button>
        </div>
        @if (validationError()) {
        <span class="error-text">{{ validationError() }}</span>
        }
    </div>

    <div class="divider">
        <span>OR</span>
    </div>

    <div class="import-dropzone-section" [class.drag-over]="isDragging()"
        [class.has-selection]="selectedFolderHandle() !== null" (dragover)="onDragOver($event)"
        (dragleave)="onDragLeave($event)" (drop)="onDrop($event)"
        (click)="!selectedFolderHandle() && onClickImportFolder()"
        [attr.role]="!selectedFolderHandle() ? 'button' : null" [attr.tabindex]="!selectedFolderHandle() ? '0' : null"
        (keyup.enter)="!selectedFolderHandle() && onClickImportFolder()">

        @if (!selectedFolderHandle()) {
        <i class="bi bi-folder-plus drop-icon"></i>
        <strong class="drop-title">Import from Folder</strong>
        <span class="drop-desc">Drag & Drop an existing folder here or click to browse</span>
        } @else {
        <i class="bi bi-folder-check preview-icon"></i>
        <strong class="file-name" [title]="selectedFolderHandle()?.name">
            {{ selectedFolderHandle()?.name }}
        </strong>
        <span>{{ folderSizePreview() }}</span>
        }
    </div>

    <!-- ACTIONS (Only visible when folder is selected) -->
    <div class="actions">
        <button type="button" class="btn secondary" (click)="removeSelection()"
            [disabled]="!selectedFolderHandle() || isSubmitting()">
            Remove
        </button>
        <button type="button" class="btn primary" (click)="confirmImport()"
            [disabled]="!selectedFolderHandle() || isSubmitting()">
            @if (isSubmitting()) {
            <i class="bi bi-arrow-repeat spin"></i> Importing...
            } @else {
            Import
            }
        </button>
    </div>
</div>
