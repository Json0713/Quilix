<div class="store-state">
  <div class="store-header">
    <div class="store-icon">
      <i class="bi bi-browser-chrome"></i>
    </div>
    <h2>Browser App</h2>
    <p>Enter a URL to browse the web, or launch a safe app below.</p>
    
    <form class="search-form" (submit)="onSearchSubmit($event)">
      <div class="search-input-wrapper">
        <i class="bi bi-search search-icon"></i>
        <input 
          type="text" 
          placeholder="Search or enter web address..." 
          [value]="searchQuery" 
          (input)="onSearchInput($event)"
          class="search-input">
      </div>
    </form>
  </div>

  <div class="store-grid">
    @for (app of recommendedApps; track app.title) {
      <div class="app-card" (click)="launchApp(app.url)">
        <div class="app-icon">
          <i class="bi {{ app.icon }}"></i>
        </div>
        <div class="app-details">
          <span class="app-category">{{ app.category }}</span>
          <h3 class="app-title">{{ app.title }}</h3>
          <p class="app-description">{{ app.description }}</p>
        </div>
      </div>
    }
  </div>
</div>
