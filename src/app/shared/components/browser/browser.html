<div class="browser-container">
  @if (safeUrl) {
    <ng-template appPageHeaderActions>
      <button class="header-action-btn" (click)="toggleBookmark()" [title]="isBookmarked ? 'Remove Bookmark' : 'Add Bookmark'">
        <i class="bi" [class.bi-bookmark-fill]="isBookmarked" [class.bi-bookmark]="!isBookmarked" [class.text-primary]="isBookmarked"></i>
      </button>
      <button class="header-action-btn" (click)="reloadFrame()" title="Reload Frame">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
      <button class="header-action-btn" (click)="toggleFullscreen()" [title]="isFullscreen ? 'Exit Fullscreen' : 'Enter Fullscreen'">
        <i class="bi" [class.bi-fullscreen-exit]="isFullscreen" [class.bi-fullscreen]="!isFullscreen"></i>
      </button>
    </ng-template>
    <iframe 
      #browserFrame 
      [src]="safeUrl" 
      class="browser-frame" 
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-pointer-lock allow-downloads allow-presentation allow-orientation-lock allow-popups-to-escape-sandbox"
      allow="accelerometer; ambient-light-sensor; autoplay; camera; clipboard-read; clipboard-write; display-capture; encrypted-media; fullscreen; geolocation; gyroscope; hid; microphone; midi; payment; picture-in-picture; pointer-lock; screen-wake-lock; usb; vr; web-share; xr-spatial-tracking"
      allowfullscreen="true"
      webkitallowfullscreen="true"
      mozallowfullscreen="true">
    </iframe>
  } @else {
    <div class="empty-state">
      <div class="empty-icon">
        <i class="bi bi-globe2"></i>
      </div>
      <h2>Quilix Browser</h2>
      <p>Enter a URL in the address bar to browse the web.</p>
    </div>
  }
</div>
