<div class="file-explorer-container" (contextmenu)="openEmptyAreaMenu($event)" (click)="closeMenus()">

    <!-- Main Content Area -->
    <main class="explorer-body p-3 h-100 position-relative overflow-y-auto">
        
        <!-- Loading State -->
        <div class="loading-overlay" *ngIf="isLoading()">
            <div class="spinner-border spinner-border-sm" style="color: var(--text-muted);" role="status"></div>
            <span class="ms-2 fs-7" style="color: var(--text-muted);">Loading contents...</span>
        </div>

        <!-- Rename/Create Overlay -->
        <div class="rename-inline-input glass-panel p-2 rounded d-flex align-items-center gap-2 mb-3" *ngIf="renamingEntry() || isCreatingFolder() || isCreatingFile()">
            <i class="bi bi-folder-fill folder-icon" *ngIf="isCreatingFolder()"></i>
            <i class="bi bi-file-earmark-text file-icon" *ngIf="isCreatingFile()"></i>
            
            <i class="bi bi-file-earmark-text file-icon" *ngIf="renamingEntry() && renamingEntry()?.kind === 'file'"></i>
            <i class="bi bi-folder-fill folder-icon" *ngIf="renamingEntry() && renamingEntry()?.kind === 'directory'"></i>
            
            <input type="text" class="form-control form-control-sm border-0 shadow-none bg-transparent" 
                   [value]="(isCreatingFolder() || isCreatingFile()) ? newItemName() : renameValue()" 
                   (input)="(isCreatingFolder() || isCreatingFile()) ? newItemName.set($any($event.target).value) : renameValue.set($any($event.target).value)"
                   (keyup.enter)="(isCreatingFolder() || isCreatingFile()) ? confirmCreateItem() : confirmRename()"
                   (keyup.escape)="(isCreatingFolder() || isCreatingFile()) ? cancelCreateItem() : cancelRename()"
                   autofocus placeholder="Name...">
                   
            <button class="btn btn-sm btn-text success-btn" (click)="(isCreatingFolder() || isCreatingFile()) ? confirmCreateItem() : confirmRename()"><i class="bi bi-check-lg"></i></button>
            <button class="btn btn-sm btn-text cancel-btn" (click)="(isCreatingFolder() || isCreatingFile()) ? cancelCreateItem() : cancelRename()"><i class="bi bi-x-lg"></i></button>
        </div>

        <!-- Empty State -->
        <div class="empty-state d-flex flex-column align-items-center justify-content-center text-center h-100" *ngIf="!isLoading() && sortedEntries().length === 0">
            <i class="bi bi-folder2-open display-4 text-muted opacity-50 mb-3"></i>
            <h6 class="fw-medium mb-1" style="color: var(--text-main)">This folder is empty</h6>
            <p class="text-muted fs-7 mb-0">Drag and drop files here to add them.</p>
        </div>

        <!-- Contents -->
        <div [class]="viewMode() === 'grid' ? 'file-grid' : 'file-list'" *ngIf="!isLoading() && sortedEntries().length > 0">
            <!-- List View Custom Header -->
            <div class="list-header" *ngIf="viewMode() === 'list'">
                <div class="col-header">Name</div>
                <div class="col-header">Date Modified</div>
                <div class="col-header">Size</div>
                <div class="col-header"></div> <!-- Actions padding -->
            </div>

            <div class="file-card"
                 *ngFor="let entry of sortedEntries()"
                 [class.selected]="selectedEntry()?.name === entry.name"
                 (click)="toggleSelection(entry, $event)"
                 (dblclick)="navigateInto(entry)"
                 (contextmenu)="openContextMenu(entry, $event)">
                
                <!-- GRID VIEW METADATA -->
                <ng-container *ngIf="viewMode() === 'grid'">
                    <div class="icon-wrapper">
                        <i class="bi bi-folder-fill folder-icon" *ngIf="entry.kind === 'directory'"></i>
                        <i class="bi bi-file-earmark-text file-icon" *ngIf="entry.kind === 'file'"></i>
                    </div>
                    <div class="file-details">
                        <span class="file-name" [title]="entry.name">{{ entry.name }}</span>
                    </div>
                </ng-container>

                <!-- LIST VIEW METADATA -->
                <ng-container *ngIf="viewMode() === 'list'">
                    <div class="col-name">
                        <div class="icon-wrapper">
                            <i class="bi bi-folder-fill folder-icon" *ngIf="entry.kind === 'directory'"></i>
                            <i class="bi bi-file-earmark-text file-icon" *ngIf="entry.kind === 'file'"></i>
                        </div>
                        <span class="file-name" [title]="entry.name">{{ entry.name }}</span>
                    </div>
                    <div class="col-date">
                        {{ entry.lastModified | date:'mediumDate' }}
                    </div>
                    <div class="col-size">
                        {{ entry.kind === 'file' ? formatBytes(entry.sizeBytes) : '--' }}
                    </div>
                    <div class="col-actions">
                        <button class="action-icon" (click)="openContextMenu(entry, $event); $event.stopPropagation();">
                            <i class="bi bi-three-dots-vertical"></i>
                        </button>
                    </div>
                </ng-container>
            </div>
        </div>

    </main>

    <!-- Native Context Menu -->
    <div class="ctx-menu glass-panel shadow-sm border rounded py-1 position-fixed d-flex flex-column z-3"
         *ngIf="openMenuId() !== null"
         [style.left.px]="contextMenuX()" [style.top.px]="contextMenuY()">
        
        <ng-container *ngIf="selectedEntry() as entry">
            <div class="ctx-header px-3 py-1 mb-1">
                 <small class="fs-8 text-truncate d-block" style="max-width: 150px; color: var(--text-muted);">{{entry.name}}</small>
            </div>
            <button class="btn btn-sm btn-text text-start px-3 py-1" (click)="navigateInto(entry)"><i class="bi bi-box-arrow-in-right me-2"></i> Open</button>
            <button class="btn btn-sm btn-text text-start px-3 py-1" (click)="startRename(entry)"><i class="bi bi-cursor-text me-2"></i> Rename</button>
            <div class="dropdown-divider my-1"></div>
            <button class="btn btn-sm btn-text text-start px-3 py-1" (click)="copy(entry)"><i class="bi bi-files me-2"></i> Copy</button>
            <button class="btn btn-sm btn-text text-start px-3 py-1" (click)="cut(entry)"><i class="bi bi-scissors me-2"></i> Cut</button>
            <div class="dropdown-divider my-1"></div>
            <button class="btn btn-sm btn-text text-start px-3 py-1 text-danger" (click)="deleteSelected(entry)"><i class="bi bi-trash3 me-2"></i> Delete</button>
        </ng-container>

    </div>
</div>
