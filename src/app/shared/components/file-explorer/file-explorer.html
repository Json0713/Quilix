<div class="file-explorer-container" (contextmenu)="openEmptyAreaMenu($event)" (click)="closeMenus()">

    <!-- Header / Breadcrumbs -->
    <header class="explorer-header d-flex justify-content-between align-items-center mb-0">
        <div class="explorer-nav-address-bar flex-grow-1 me-3">
            <div class="explorer-breadcrumbs">
                
                <button class="nav-btn" (click)="navigateUp()" [class.disabled]="history().length <= 1" title="Go up">
                    <i class="bi bi-arrow-up-short"></i>
                </button>
                <div class="v-divider"></div>

                <div class="crumbs-list d-flex align-items-center">
                    <ng-container *ngFor="let crumb of history(); let i = index; let last = last">
                        <a class="breadcrumb-item" [class.last]="last" (click)="navigateToCrumb(i)">
                            {{ crumb.name }}
                        </a>
                        <i class="bi bi-chevron-right breadcrumb-separator" *ngIf="!last"></i>
                    </ng-container>
                </div>
                
            </div>
        </div>

        <!-- Toolbar Actions -->
        <div class="explorer-nav-controls d-flex align-items-center gap-1">
            <!-- View ModeToggle -->
            <button class="nav-btn" (click)="toggleViewMode()" [title]="viewMode() === 'grid' ? 'List View' : 'Grid View'">
                <i class="bi" [class.bi-list-ul]="viewMode() === 'grid'" [class.bi-grid-fill]="viewMode() === 'list'"></i>
            </button>
            
            <div class="dropdown">
                <button class="nav-btn" type="button" data-bs-toggle="dropdown" title="Sort by">
                    <i class="bi bi-sort-down"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-end shadow border-0 glass-panel fs-7">
                    <li><h6 class="dropdown-header text-uppercase fs-8 text-muted">Sort By</h6></li>
                    <li><a class="dropdown-item d-flex justify-content-between align-items-center" (click)="setSort('name')">Name <i class="bi" [class.bi-check2]="sortBy() === 'name'"></i></a></li>
                    <li><a class="dropdown-item d-flex justify-content-between align-items-center" (click)="setSort('date')">Date Modified <i class="bi" [class.bi-check2]="sortBy() === 'date'"></i></a></li>
                    <li><a class="dropdown-item d-flex justify-content-between align-items-center" (click)="setSort('size')">Size <i class="bi" [class.bi-check2]="sortBy() === 'size'"></i></a></li>
                </ul>
            </div>

            <div class="v-divider mx-1"></div>
            
            <button class="nav-btn" (click)="paste()" [class.disabled]="!clipboardHasItem()" title="Paste">
                <i class="bi bi-clipboard"></i>
            </button>

            <!-- New Button -->
            <div class="dropdown ms-1">
                <button class="btn btn-sm btn-primary rounded-pill px-3 text-white dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false" title="New">
                   <i class="bi bi-plus-lg"></i> <span class="ms-1 d-none d-sm-inline">New</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end shadow border-0 glass-panel fs-7">
                    <li><button class="dropdown-item d-flex align-items-center" (click)="startCreateFolder()"><i class="bi bi-folder-plus text-warning me-2"></i> Folder</button></li>
                    <li><button class="dropdown-item d-flex align-items-center" (click)="startCreateFile()"><i class="bi bi-file-earmark-plus text-secondary me-2"></i> File</button></li>
                </ul>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="explorer-body p-3 h-100 position-relative overflow-y-auto">
        
        <!-- Loading State -->
        <div class="loading-overlay" *ngIf="isLoading()">
            <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
            <span class="ms-2 fs-7 text-muted">Loading contents...</span>
        </div>

        <!-- Rename/Create Overlay -->
        <div class="rename-inline-input glass-panel p-2 shadow-sm rounded d-flex align-items-center gap-2 mb-3" *ngIf="renamingEntry() || isCreatingFolder() || isCreatingFile()">
            <i class="bi bi-folder-fill text-warning" *ngIf="isCreatingFolder()"></i>
            <i class="bi bi-file-earmark-text text-secondary" *ngIf="isCreatingFile()"></i>
            
            <i class="bi bi-file-earmark-text text-secondary" *ngIf="renamingEntry() && renamingEntry()?.kind === 'file'"></i>
            <i class="bi bi-folder-fill text-warning" *ngIf="renamingEntry() && renamingEntry()?.kind === 'directory'"></i>
            
            <input type="text" class="form-control form-control-sm border-0 shadow-none bg-transparent" 
                   [value]="(isCreatingFolder() || isCreatingFile()) ? newItemName() : renameValue()" 
                   (input)="(isCreatingFolder() || isCreatingFile()) ? newItemName.set($any($event.target).value) : renameValue.set($any($event.target).value)"
                   (keyup.enter)="(isCreatingFolder() || isCreatingFile()) ? confirmCreateItem() : confirmRename()"
                   (keyup.escape)="(isCreatingFolder() || isCreatingFile()) ? cancelCreateItem() : cancelRename()"
                   autofocus placeholder="Name...">
                   
            <button class="btn btn-sm btn-text text-success" (click)="(isCreatingFolder() || isCreatingFile()) ? confirmCreateItem() : confirmRename()"><i class="bi bi-check-lg"></i></button>
            <button class="btn btn-sm btn-text text-danger" (click)="(isCreatingFolder() || isCreatingFile()) ? cancelCreateItem() : cancelRename()"><i class="bi bi-x-lg"></i></button>
        </div>

        <!-- Empty State -->
        <div class="empty-state d-flex flex-column align-items-center justify-content-center text-center h-100" *ngIf="!isLoading() && sortedEntries().length === 0">
            <i class="bi bi-folder2-open display-4 text-muted opacity-50 mb-3"></i>
            <h6 class="text-body fw-medium mb-1">This folder is empty</h6>
            <p class="text-muted fs-7 mb-0">Drag and drop files here to add them.</p>
        </div>

        <!-- Contents -->
        <div [class]="viewMode() === 'grid' ? 'file-grid' : 'file-list'" *ngIf="!isLoading() && sortedEntries().length > 0">
            <div class="file-card p-2 rounded transition-all user-select-none"
                 [class.d-flex]="true"
                 [class.flex-column]="viewMode() === 'grid'"
                 [class.align-items-center]="true"
                 [class.text-center]="viewMode() === 'grid'"
                 [class.flex-row]="viewMode() === 'list'"
                 [class.text-start]="viewMode() === 'list'"
                 *ngFor="let entry of sortedEntries()"
                 [class.selected]="selectedEntry()?.name === entry.name"
                 (click)="toggleSelection(entry, $event)"
                 (dblclick)="navigateInto(entry)"
                 (contextmenu)="openContextMenu(entry, $event)">
                
                <div class="icon-wrapper position-relative" [class.mb-2]="viewMode() === 'grid'" [class.me-3]="viewMode() === 'list'">
                    <i class="bi bi-folder-fill file-icon text-warning" [class.display-6]="viewMode() === 'grid'" [class.fs-4]="viewMode() === 'list'" *ngIf="entry.kind === 'directory'"></i>
                    <i class="bi bi-file-earmark-text file-icon text-secondary" [class.display-6]="viewMode() === 'grid'" [class.fs-4]="viewMode() === 'list'" *ngIf="entry.kind === 'file'"></i>
                </div>
                
                <div class="file-details d-flex flex-column flex-grow-1 min-w-0">
                    <span class="file-name fs-7 text-truncate w-100 fw-medium" [title]="entry.name">{{ entry.name }}</span>
                    <span class="file-meta fs-8 text-muted mt-1" *ngIf="viewMode() === 'list' && entry.kind === 'file'">
                        {{ formatBytes(entry.sizeBytes) }} &bull; {{ entry.lastModified | date:'medium' }}
                    </span>
                </div>
            </div>
        </div>

    </main>

    <!-- Native Context Menu -->
    <div class="ctx-menu glass-panel shadow-sm border rounded py-1 position-fixed d-flex flex-column z-3"
         *ngIf="openMenuId() !== null"
         [style.left.px]="contextMenuX()" [style.top.px]="contextMenuY()">
        
        <ng-container *ngIf="selectedEntry() as entry">
            <div class="ctx-header px-3 py-1 mb-1 border-bottom">
                 <small class="text-muted fs-8 text-truncate d-block" style="max-width: 150px;">{{entry.name}}</small>
            </div>
            <button class="btn btn-sm btn-text text-start px-3 py-1 rounded-0" (click)="navigateInto(entry)"><i class="bi bi-box-arrow-in-right me-2 text-muted"></i> Open</button>
            <button class="btn btn-sm btn-text text-start px-3 py-1 rounded-0" (click)="startRename(entry)"><i class="bi bi-cursor-text me-2 text-muted"></i> Rename</button>
            <div class="dropdown-divider my-1"></div>
            <button class="btn btn-sm btn-text text-start px-3 py-1 rounded-0" (click)="copy(entry)"><i class="bi bi-files me-2 text-muted"></i> Copy</button>
            <button class="btn btn-sm btn-text text-start px-3 py-1 rounded-0" (click)="cut(entry)"><i class="bi bi-scissors me-2 text-muted"></i> Cut</button>
            <div class="dropdown-divider my-1"></div>
            <button class="btn btn-sm btn-text text-start px-3 py-1 rounded-0 text-danger" (click)="deleteSelected(entry)"><i class="bi bi-trash3 me-2"></i> Delete</button>
        </ng-container>

    </div>
</div>
