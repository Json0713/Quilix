<section class="step-welcome" aria-label="Welcome to Quilix">

  <!-- Brand Visual -->
  <div class="brand-visual">
    <div class="logo-glow"></div>
    <div class="logo-icon">
      <i class="bi bi-feather"></i>
    </div>
  </div>

  <!-- Content -->
  <div class="welcome-content">
    <div class="version-badge">
      <i class="bi bi-tag"></i>
      <span>v{{ version.version }}</span>
    </div>

    <h1>Welcome to Quilix</h1>
    <p class="tagline">
      An open source Framework for your Personal Workspace.
    </p>

    <div class="highlights">
      <div class="highlight-item">
        <i class="bi bi-lightning-charge"></i>
        <span>Saved on Local Device</span>
      </div>
      <div class="highlight-item">
        <i class="bi bi-chat-quote"></i>
        <span>Quilix AI Chat Assistant</span>
      </div>
      <div class="highlight-item">
        <i class="bi bi-hdd-network"></i>
        <span>Local File System Sync</span>
      </div>
    </div>
  </div>

  <button class="continue-btn" (click)="continue.emit()">
    <span>Get Started</span>
    <i class="bi bi-arrow-right"></i>
  </button>

</section>
