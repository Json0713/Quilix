<section class="step-launchpad" aria-label="Choose Your Path">

  <div class="step-header">
    <div class="step-icon">
      <i class="bi bi-rocket-takeoff"></i>
    </div>
    <h2>Launchpad</h2>
    <p>You're all set! Choose how you'd like to start.</p>
  </div>

  <div class="launch-options">
    <!-- Quilix Workspace (Local) -->
    <a class="launch-card" routerLink="/login" (click)="onLaunch()">
      <div class="launch-preview workspace-preview">
        <div class="preview-inner">
          <i class="bi bi-pc-display"></i>
          <div class="preview-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>
      <div class="launch-card-body">
        <div class="launch-card-title">
          <i class="bi bi-pc-display-horizontal"></i>
          <strong>Workspace</strong>
        </div>
        <p>Get Started with your Personal Workspace</p>
      </div>
      <div class="launch-card-footer">
        <span>Start Workspace</span>
        <i class="bi bi-arrow-right"></i>
      </div>
    </a>

    <!-- Quilix Meta (Social/Team) -->
    <a class="launch-card" routerLink="/meta/login" (click)="onLaunch()">
      <div class="launch-preview meta-preview">
        <div class="preview-inner">
          <i class="bi bi-people-fill"></i>
          <div class="preview-line"></div>
        </div>
      </div>
      <div class="launch-card-body">
        <div class="launch-card-title">
          <i class="bi bi-feather2"></i>
          <strong>Meta</strong>
        </div>
        <p>Quilix Social.</p>
      </div>
      <div class="launch-card-footer">
        <span>Go to Meta</span>
        <i class="bi bi-arrow-right"></i>
      </div>
    </a>

    <!-- Quilix Site (Public/Portal) -->
    <a class="launch-card" routerLink="/meta" (click)="onLaunch()">
      <div class="launch-preview site-preview">
        <div class="preview-inner">
          <i class="bi bi-browser-safari"></i>
          <div class="preview-rect"></div>
        </div>
      </div>
      <div class="launch-card-body">
        <div class="launch-card-title">
          <i class="bi bi-globe2"></i>
          <strong>Explore Site</strong>
        </div>
        <p>Explore Site and Community Hub for the Quilix framework.</p>
      </div>
      <div class="launch-card-footer">
        <span>Visit Site</span>
        <i class="bi bi-arrow-right"></i>
      </div>
    </a>
  </div>

</section>
