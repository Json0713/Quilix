<div class="doc-page-container h-100 w-100 position-relative">
    @if (loading()) {
        <div class="loading-state h-100 d-flex align-items-center justify-content-center">
            <div class="space-loading text-muted text-center">
                <i class="bi bi-arrow-repeat spin display-4"></i>
                <p class="mt-2">Loading document...</p>
            </div>
        </div>
    } @else if (docId() && spaceId()) {
        <app-doc [docId]="docId()!" (docSelected)="onDocSelected($event)" class="w-100 h-100 d-block"></app-doc>
    } @else {
        <div class="error-state">
            <i class="bi bi-exclamation-triangle"></i>
            <h4>Document Not Found</h4>
            <p>The document you are looking for does not exist or has been removed.</p>
            <button class="btn btn-primary mt-3" (click)="goBack()">Return to Space</button>
        </div>
    }
</div>
