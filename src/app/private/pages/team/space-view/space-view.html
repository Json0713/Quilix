<app-breadcrumb></app-breadcrumb>

@if (!loading()) {
<div class="dashboard-container">
    @if (space()) {
        <main class="page-content p-0 m-0 w-100 position-relative">
            @if (workspaceId()) {
                <app-file-explorer 
                    [spaceId]="space()!.id"
                    [workspaceId]="workspaceId()!"
                    [rootHandle]="spaceHandle()"
                    [spaceName]="space()?.name || 'Space'"
                    class="w-100 h-100 d-block">
                </app-file-explorer>
            } @else {
                <div class="p-4 text-center">
                    <i class="bi bi-hourglass-split display-4 opacity-50"></i>
                    <p class="mt-2 text-muted">Awaiting workspace context...</p>
                </div>
            }
        </main>
    } @else {
        <div class="space-not-found">
            <i class="bi bi-folder-x"></i>
            <h3>Space not found</h3>
            <p>This space may have been deleted or moved.</p>
        </div>
    }
</div>
}

@if (loading()) {
<div class="loading-state">
    <div class="space-loading">
        <i class="bi bi-arrow-repeat spin"></i>
    </div>
</div>
}
