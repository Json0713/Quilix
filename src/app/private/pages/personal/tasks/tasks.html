<div class="dashboard-container animate-fade-in">
  <app-breadcrumb></app-breadcrumb>

  <!-- Task Metrics Overview -->
  <div class="metrics-grid">
    <!-- Total Tasks -->
    <div class="metric-card stat-card">
      <div class="stat-icon type-total">
        <i class="bi bi-list-task"></i>
      </div>
      <div class="stat-text">
        <span class="label">Total Tasks</span>
        <div class="value-row">
          <span class="value">{{ totalTasks }}</span>
          <span class="limit">Pipeline</span>
        </div>
      </div>
    </div>

    <!-- In Progress -->
    <div class="metric-card stat-card">
      <div class="stat-icon type-progress">
        <i class="bi bi-arrow-repeat"></i>
      </div>
      <div class="stat-text">
        <span class="label">In Progress</span>
        <div class="value-row">
          <span class="value">{{ inProgressTasks }}</span>
          <span class="limit">Active blocks</span>
        </div>
      </div>
    </div>

    <!-- Completed -->
    <div class="metric-card stat-card">
      <div class="stat-icon type-completed">
        <i class="bi bi-check2-circle"></i>
      </div>
      <div class="stat-text">
        <span class="label">Completed</span>
        <div class="value-row">
          <span class="value">{{ completedTasks }}</span>
          <span class="limit">Resolved</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Task Board List -->
  <div class="task-board-section">
    <div class="board-actions flex flex-row justify-content-between align-items-center mb-4"
      style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
      <h2 class="board-title" style="margin: 0; padding-left: 4px;">Active Track</h2>

      <button class="action-btn" (click)="seedDemoTask()"
        style="background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 500;">
        <i class="bi bi-plus-lg"></i> New Element
      </button>
    </div>

    <app-task-board [tasks]="tasks()"></app-task-board>
  </div>
</div>
