<!doctype html>
<html lang="en">
<head>

  <script>
    (function () {
      try {
        const stored = localStorage.getItem('theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = stored === 'light' || stored === 'dark'
          ? stored
          : systemDark ? 'dark' : 'light';
        document.documentElement.classList.add(
          theme === 'dark' ? 'dark-theme' : 'light-theme'
        );
      } catch (e) {}
    })();
  </script>

  <!-- Core -->
  <meta charset="utf-8">
  <title>Quilix</title>
  <base href="/" />

  <!-- Viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Primary SEO -->
  <meta name="description" content="Quilix – A modern cross-platform application educational framework.">
  <meta name="author" content="Quilix">
  <meta name="robots" content="index, follow">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Quilix">
  <meta property="og:description" content="A modern cross-platform application educational framework.">
  <meta property="og:image" content="https://quilix.vercel.app/assets/brand/quilix-snapshot-og.png">
  <meta property="og:url" content="https://quilix.vercel.app">

  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="96x96" href="assets/icons/favicon-96x96.png">
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="shortcut icon" href="assets/icons/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">

  <!-- PWA / Mobile -->
  <meta name="apple-mobile-web-app-title" content="Quilix">
  <meta name="theme-color" content="#232222">
  <link rel="manifest" href="assets/site.webmanifest">

  <style>
    /* ── Container ──────────────────────────────────────────────────────── */
    #app-splash {
      position: fixed;
      inset: 0;
      z-index: 99999;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;

      /* Fully opaque solid fill — the SVG bg pattern must NOT bleed through */
      background-color: #d8e3e4;

      /* Smooth exit: fade-out + subtle scale-up */
      transition: opacity 250ms ease, transform 250ms ease;
    }

    html.dark-theme #app-splash {
      background-color: #060614;
    }

    /* Exit state — added by hideSplash() */
    #app-splash.splash-hidden {
      opacity: 0;
      transform: scale(1.025);
      pointer-events: none;
    }

    /* ── Logo ───────────────────────────────────────────────────────────── */
    #app-splash .splash-logo {
      width: 96px;
      height: 96px;
      color: #244f55;
      opacity: 0;
      animation: splashFadeUp 600ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    html.dark-theme #app-splash .splash-logo {
      color: #3fbac2;
    }

    /* ── Dot loader ─────────────────────────────────────────────────────── */
    #app-splash .splash-dots {
      display: flex;
      gap: 14px;
      opacity: 0;
      animation: splashFadeUp 500ms cubic-bezier(0.22, 1, 0.36, 1) 250ms forwards;
    }

    #app-splash .splash-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background-color: #244f55;
      animation:
        splashBreathe    1.4s ease-in-out infinite,
        splashColorShift 3.0s ease-in-out infinite;
    }

    html.dark-theme #app-splash .splash-dot {
      background-color: #3fbac2;
    }

    /* Staggered wave timing */
    #app-splash .splash-dot:nth-child(1) { animation-delay: 0s,    0s;    }
    #app-splash .splash-dot:nth-child(2) { animation-delay: 0.15s, 0.15s; }
    #app-splash .splash-dot:nth-child(3) { animation-delay: 0.30s, 0.30s; }
    #app-splash .splash-dot:nth-child(4) { animation-delay: 0.45s, 0.45s; }
    #app-splash .splash-dot:nth-child(5) { animation-delay: 0.60s, 0.60s; }

    /* ── Keyframes ──────────────────────────────────────────────────────── */
    @keyframes splashFadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    @keyframes splashBreathe {
      0%, 100% { transform: scale(0.70); opacity: 0.40; }
      50%       { transform: scale(1.35); opacity: 1;    }
    }

    @keyframes splashColorShift {
      0%   { background-color: #1a3a3f; }
      33%  { background-color: #244f55; }
      66%  { background-color: #3fbac2; }
      100% { background-color: #1a3a3f; }
    }

    /* ── Accessibility: honour reduced-motion preference ─────────────────── */
    @media (prefers-reduced-motion: reduce) {
      #app-splash .splash-logo,
      #app-splash .splash-dots { animation: none; opacity: 1; }
      #app-splash .splash-dot  { animation: none; opacity: 0.8; }
      #app-splash               { transition: opacity 150ms ease; }
    }
  </style>
</head>
<body>

  <div id="app-splash" role="status" aria-label="Loading Quilix">

    <!-- Official Quilix logo — inline SVG, zero network request -->
    <svg class="splash-logo"
         xmlns="http://www.w3.org/2000/svg"
         viewBox="0 0 16 16"
         fill="currentColor"
         aria-hidden="true">
      <path d="M15.807.531c-.174-.177-.41-.289-.64-.363a3.8 3.8 0 0 0-.833-.15c-.62-.049-1.394 0-2.252.175C10.365.545 8.264 1.415 6.315 3.1S3.147 6.824 2.557 8.523c-.294.847-.44 1.634-.429 2.268.005.316.05.62.154.88q.025.061.056.122A68 68 0 0 0 .08 15.198a.53.53 0 0 0 .157.72.504.504 0 0 0 .705-.16 68 68 0 0 1 2.158-3.26c.285.141.616.195.958.182.513-.02 1.098-.188 1.723-.49 1.25-.605 2.744-1.787 4.303-3.642l1.518-1.55a.53.53 0 0 0 0-.739l-.729-.744 1.311.209a.5.5 0 0 0 .443-.15l.663-.684c.663-.68 1.292-1.325 1.763-1.892.314-.378.585-.752.754-1.107.163-.345.278-.773.112-1.188a.5.5 0 0 0-.112-.172M3.733 11.62C5.385 9.374 7.24 7.215 9.309 5.394l1.21 1.234-1.171 1.196-.027.03c-1.5 1.789-2.891 2.867-3.977 3.393-.544.263-.99.378-1.324.39a1.3 1.3 0 0 1-.287-.018Zm6.769-7.22c1.31-1.028 2.7-1.914 4.172-2.6a7 7 0 0 1-.4.523c-.442.533-1.028 1.134-1.681 1.804l-.51.524zm3.346-3.357C9.594 3.147 6.045 6.8 3.149 10.678c.007-.464.121-1.086.37-1.806.533-1.535 1.65-3.415 3.455-4.976 1.807-1.561 3.746-2.36 5.31-2.68a8 8 0 0 1 1.564-.173"/>
    </svg>

    <!-- Animated dot loader -->
    <div class="splash-dots">
      <span class="splash-dot"></span>
      <span class="splash-dot"></span>
      <span class="splash-dot"></span>
      <span class="splash-dot"></span>
      <span class="splash-dot"></span>
    </div>
  </div>

  <app-root></app-root>

  <script>
    window.hideSplash = function () {
      var splash = document.getElementById('app-splash');
      if (!splash) return;
      splash.classList.add('splash-hidden');
      splash.addEventListener('transitionend', function () {
        splash.remove();
      }, { once: true });
    };
  </script>

</body>
</html>
